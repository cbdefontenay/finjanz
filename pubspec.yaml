name: finjanz
description: "Finjanz ist eine schlanke, datenschutzfreundliche Finanz-Übersichts-App für Android."
publish_to: 'none'
version: 1.0.9+9

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  sqflite: ^2.4.2
  path: ^1.9.0
  provider: ^6.1.5+1
  intl: ^0.20.2
  csv: ^6.0.0
  path_provider: ^2.1.5
  share_plus: ^12.0.2
  fl_chart: ^1.2.0
  file_picker: ^11.0.2
  shared_preferences: ^2.5.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
