name: finjanz
description: "Finjanz ist eine schlanke, datenschutzfreundliche Finanz-Übersichts-App für Android."
publish_to: 'none'
version: 1.0.4+4

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  sqflite: ^2.3.0
  path: ^1.9.0
  provider: ^6.1.1
  intl: ^0.20.2
  csv: ^6.0.0
  path_provider: ^2.1.2
  share_plus: ^10.1.2
  fl_chart: ^0.70.0
  file_picker: ^8.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
